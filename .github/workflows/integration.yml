name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Run integration tests
        run: |
          chmod +x tests/integration_test.sh
          ./tests/integration_test.sh